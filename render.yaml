databases:
  - name: staynaija-db
    databaseName: staynaija
    user: staynaija
    plan: free

services:
  - type: web
    name: staynaija
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: staynaija-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
