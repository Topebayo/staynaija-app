{% extends 'base.html' %}

{% block title %}Delete Apartment — StayNaija{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 sm:px-6 lg:px-8 py-12 fade-in">
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 text-center">
        <p class="text-4xl mb-4">⚠️</p>
        <h1 class="text-xl font-bold text-gray-900 mb-2">Delete this apartment?</h1>
        <p class="text-gray-500 mb-2">{{ apartment.title }}</p>
        <p class="text-sm text-gray-400 mb-6">{{ apartment.location }} · {{ apartment.price_display }}/night</p>
        <p class="text-sm text-red-500 mb-8">This action cannot be undone.</p>

        <form method="POST" class="flex justify-center gap-3">
            {% csrf_token %}
            <a href="{% url 'apartments:dashboard' %}"
                class="px-6 py-3 rounded-xl text-sm font-medium text-gray-600 border border-gray-200 hover:bg-gray-50 transition-colors">
                Cancel
            </a>
            <button type="submit"
                class="bg-red-500 text-white px-6 py-3 rounded-xl font-semibold hover:bg-red-600 transition-colors text-sm">
                Yes, Delete
            </button>
        </form>
    </div>
</div>
{% endblock %}
