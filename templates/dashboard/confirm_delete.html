{% extends 'base.html' %}

{% block title %}Delete Apartment — StayNaija{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 sm:px-6 lg:px-8 py-12 fade-in">
    <div class="bg-white dark:bg-[#0a0a0a] border border-gray-200 dark:border-rich-800 rounded-none p-10 text-center shadow-luxury transition-colors duration-300">
        <p class="text-4xl mb-6">⚠️</p>
        <h1 class="text-2xl font-serif font-bold text-rich-900 dark:text-white mb-3">Remove this residence?</h1>
        <p class="text-gray-500 dark:text-gray-400 mb-1 font-medium">{{ apartment.title }}</p>
        <p class="text-xs text-gray-400 mb-6 uppercase tracking-widest font-bold">{{ apartment.location }} · {{ apartment.price_display }}/night</p>
        <p class="text-xs text-red-500 mb-10 font-bold uppercase tracking-widest">This action cannot be undone.</p>

        <form method="POST" class="flex justify-center gap-3">
            {% csrf_token %}
            <a href="{% url 'apartments:dashboard' %}"
                class="px-8 py-4 rounded-none text-xs font-bold uppercase tracking-widest text-gray-600 dark:text-gray-400 border border-gray-200 dark:border-rich-800 hover:border-gold-500 hover:text-gold-500 transition-colors">
                Cancel
            </a>
            <button type="submit"
                class="bg-red-600 text-white px-8 py-4 rounded-none text-xs font-bold uppercase tracking-widest hover:bg-red-700 transition-colors">
                Yes, Delete
            </button>
        </form>
    </div>
</div>
{% endblock %}
