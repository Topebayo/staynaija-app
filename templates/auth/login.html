{% extends 'base.html' %}

{% block title %}Log In — StayNaija{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md fade-in">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-serif font-bold text-rich-900 dark:text-white mb-2">Welcome Back</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm font-semibold tracking-widest uppercase">Log in to manage your portfolio</p>
        </div>

        <div class="bg-white dark:bg-[#0a0a0a] rounded-none border border-gray-200 dark:border-rich-800 shadow-luxury p-8 transition-colors">
            <form method="POST" class="space-y-4">
                {% csrf_token %}

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-700 dark:text-gray-300 mb-2">Username</label>
                    {{ form.username }}
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-700 dark:text-gray-300 mb-2 mt-4">Password</label>
                    {{ form.password }}
                </div>

                <button type="submit"
                    class="w-full bg-rich-900 dark:bg-gold-500 text-white dark:text-rich-950 py-4 rounded-none font-bold uppercase tracking-widest text-xs hover:bg-gold-500 dark:hover:bg-white transition-colors mt-6 shadow-luxury">
                    Sign In
                </button>
            </form>

            <p class="text-center text-sm font-semibold text-gray-500 dark:text-gray-400 mt-8 uppercase tracking-widest">
                Don't have an account?
                <a href="{% url 'apartments:signup' %}" class="text-gold-500 font-bold hover:text-rich-900 dark:hover:text-white transition-colors">Apply here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
